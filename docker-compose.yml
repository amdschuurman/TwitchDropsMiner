services:
  twitch-drops-miner:
    build: .
    container_name: twitch-drops-miner
    image: twitch-drops-miner:latest
    ports:
      # Bind to loopback by default — change to "0.0.0.0:8080:8080" only if
      # you intend to expose the unauthenticated UI to your LAN. Combine with
      # the bearer-token auth (printed on first run) before doing so.
      - "127.0.0.1:8080:8080"
    volumes:
      # Mount data directory for persistent storage
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      # Set timezone (optional, defaults to UTC)
      - TZ=Australia/Sydney
      # Override the bind host inside the container. Leave as 0.0.0.0 so docker
      # can map the port; restrict exposure via the "ports" entry above instead.
      - TDM_HOST=0.0.0.0
    restart: unless-stopped
